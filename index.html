<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Neon Control Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050816;
  color:#e5e7eb;
  overflow-x:hidden;
  transition:0.3s;
}

header{
  padding:40px;
  text-align:center;
  background:linear-gradient(135deg,#6366f1,#0ea5e9);
  color:white;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  transition:0.3s;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#22c55e;
  color:black;
  font-weight:bold;
  margin-top:10px;
}

.big{
  font-size:28px;
  font-weight:bold;
}

.glow{
  text-shadow:0 0 10px #22c55e,0 0 20px #22c55e;
}

.console{
  background:black;
  padding:10px;
  height:200px;
  overflow:auto;
  font-family:monospace;
  font-size:12px;
  border-radius:10px;
  color:#22c55e;
}

.energy{
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:10px;
  width:10%;
  background:#22c55e;
  transition:0.3s;
}

.glitch{
  animation:glitch 0.3s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(2px,-2px)}
  60%{transform:translate(-1px,1px)}
  80%{transform:translate(1px,-1px)}
  100%{transform:translate(0)}
}

.light{
  background:#f3f4f6;
  color:#111827;
}

.neon{
  background:#050816;
}

</style>
</head>

<body>

<header>
  <h1>⚡ NEON CONTROL HUB</h1>
  <p>Interakcyjny system UI / mini symulacja / dashboard</p>
  <button onclick="toggleTheme()">Zmień tryb</button>
</header>

<div class="container">

<!-- LEWY PANEL -->
<div class="card">
  <div class="big glow">SYSTEM STATUS</div>

  <p>Energia systemu</p>
  <div class="energy">
    <div class="bar" id="bar"></div>
  </div>

  <button onclick="boost()">Zasil system ⚡</button>

  <hr>

  <h3>🧠 Losowy cytat</h3>
  <p id="quote">Kliknij przycisk</p>
  <button onclick="quote()">Nowy cytat</button>
</div>

<!-- PRAWY PANEL -->
<div class="card">
  <h3>💻 TERMINAL</h3>

  <div class="console" id="console"></div>

  <button onclick="hack()">RUN SYSTEM CHECK</button>
  <button onclick="clearConsole()">CLEAR</button>
</div>

</div>

<script>

let energy = 10;

function toggleTheme(){
  document.body.classList.toggle("light");
}

function boost(){
  energy += 20;
  if(energy > 100) energy = 100;

  document.getElementById("bar").style.width = energy + "%";
}

const quotes = [
  "System działa stabilnie.",
  "Każdy błąd to nowa możliwość.",
  "Kod to logika świata.",
  "Nie ma limitów — są tylko błędy.",
  "Technologia to nowa forma sztuki."
];

function quote(){
  document.getElementById("quote").innerText =
    quotes[Math.floor(Math.random()*quotes.length)];
}

function log(msg){
  const c = document.getElementById("console");
  c.innerHTML += ">> " + msg + "<br>";
  c.scrollTop = c.scrollHeight;
}

function hack(){
  document.body.classList.add("glitch");

  let steps = [
    "Łączenie z systemem...",
    "Omijanie firewall...",
    "Analiza danych...",
    "Dostęp uzyskany ✔"
  ];

  let i = 0;

  let interval = setInterval(()=>{
    log(steps[i]);
    i++;
    if(i >= steps.length){
      clearInterval(interval);
      document.body.classList.remove("glitch");
    }
  },500);
}

function clearConsole(){
  document.getElementById("console").innerHTML = "";
}

</script>

</body>
</html>
