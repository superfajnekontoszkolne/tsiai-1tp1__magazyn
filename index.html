<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced UI</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --accent: #38bdf8;
    }

    body.light {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui;
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      background: var(--accent);
      color: black;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
      transform: translateY(20px);
      opacity: 0;
    }

    .card.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
    }

    .progress {
      height: 10px;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width 1s ease;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <h2>🚀 Advanced UI</h2>
  <button class="btn" onclick="toggleTheme()">Tryb</button>
</header>

<section class="grid" id="grid">
  <div class="card">
    <h3>Karta 1</h3>
    <p>Nowoczesny komponent UI</p>
    <div class="progress"><div class="progress-bar" data-value="80"></div></div>
  </div>

  <div class="card">
    <h3>Karta 2</h3>
    <p>Animacje + Intersection Observer</p>
    <div class="progress"><div class="progress-bar" data-value="60"></div></div>
  </div>

  <div class="card">
    <h3>Karta 3</h3>
    <p>Responsywny grid</p>
    <div class="progress"><div class="progress-bar" data-value="95"></div></div>
  </div>
</section>

<footer>
  <p>Made with ❤️ + JS</p>
</footer>

<script>
  function toggleTheme() {
    document.body.classList.toggle("light");
  }

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");

        const bar = entry.target.querySelector(".progress-bar");
        if (bar) {
          bar.style.width = bar.dataset.value + "%";
        }
      }
    });
  });

  document.querySelectorAll(".card").forEach(card => {
    observer.observe(card);
  });
</script>

</body>
</html>
