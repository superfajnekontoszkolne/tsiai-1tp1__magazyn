<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Premium Blog - Lewandowski</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

header{
    padding:40px;
    text-align:center;
    background:linear-gradient(135deg,#1e3a8a,#0b1220);
}

.premium{
    border:2px solid gold;
    box-shadow:0 0 20px gold;
}

.container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

.card{
    background:#111a2e;
    padding:20px;
    border-radius:12px;
}

input,textarea,button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.comment{
    background:#1b2a44;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.admin{
    color:gold;
    font-weight:bold;
}

.small{
    opacity:0.7;
    font-size:12px;
}
</style>
</head>

<body>

<header class="premium" id="hero">
    <h1>⚽ Robert Lewandowski Premium Blog</h1>
    <p>Ekskluzywny fanblog + demo systemu</p>
</header>

<div class="container">

<!-- LEWA STRONA -->
<div class="card">
    <h2>Artykuł</h2>
    <p>
        Robert Lewandowski to jeden z najlepszych napastników w historii piłki nożnej.
        Znany z niesamowitej skuteczności i inteligencji boiskowej.
    </p>

    <hr>

    <h2>Komentarze</h2>
    <div id="comments"></div>

    <h3>Dodaj komentarz</h3>
    <input id="text" placeholder="Twój komentarz">
    <button onclick="addComment()">Dodaj</button>

    <button onclick="logout()">Wyloguj</button>
</div>

<!-- PRAWA STRONA -->
<div class="card">
    <h2>Login</h2>

    <div id="loginBox">
        <input id="user" placeholder="login">
        <input id="pass" placeholder="hasło">
        <button onclick="login()">Zaloguj</button>
        <p class="small">demo: admin / admin</p>
    </div>

    <h2>Statystyki</h2>
    <div id="stats"></div>
</div>

</div>

<script>

/* -------------------------
   SYSTEM LOGOWANIA (FAKE)
--------------------------*/

function login(){
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if(u==="admin" && p==="admin"){
        localStorage.setItem("role","admin");
        alert("Zalogowano jako ADMIN");
    } else {
        localStorage.setItem("role","user");
        alert("Zalogowano jako USER");
    }

    render();
}

function logout(){
    localStorage.removeItem("role");
    render();
}

/* -------------------------
   KOMENTARZE (LOCAL STORAGE)
--------------------------*/

function getComments(){
    return JSON.parse(localStorage.getItem("comments") || "[]");
}

function saveComments(c){
    localStorage.setItem("comments", JSON.stringify(c));
}

function addComment(){
    const text = document.getElementById("text").value;
    if(!text) return;

    const role = localStorage.getItem("role") || "user";

    const comments = getComments();
    comments.push({
        text,
        role,
        id:Date.now()
    });

    saveComments(comments);
    document.getElementById("text").value="";
    render();
}

function deleteComment(id){
    let comments = getComments();
    comments = comments.filter(c=>c.id!==id);
    saveComments(comments);
    render();
}

/* -------------------------
   RENDER
--------------------------*/

function render(){
    const role = localStorage.getItem("role");
    const box = document.getElementById("loginBox");

    if(role){
        box.innerHTML = `<p>Zalogowany: <b>${role}</b></p>`;
    } else {
        box.innerHTML = `
        <input id="user" placeholder="login">
        <input id="pass" placeholder="hasło">
        <button onclick="login()">Zaloguj</button>
        <p class="small">demo: admin / admin</p>`;
    }

    const comments = getComments();
    const container = document.getElementById("comments");

    container.innerHTML = comments.map(c=>`
        <div class="comment">
            <b class="${c.role==='admin'?'admin':''}">${c.role}</b>: ${c.text}
            ${role==="admin" ? `<button onclick="deleteComment(${c.id})">Usuń</button>` : ""}
        </div>
    `).join("");

    loadStats();
}

/* -------------------------
   FAKE API STATYSTYK
--------------------------*/

function loadStats(){
    document.getElementById("stats").innerHTML = `
        ⚽ Gole: 600+<br>
        🏆 Trofea: 30+<br>
        🇵🇱 Reprezentacja: Kapitan
    `;
}

/* -------------------------
   ANIMACJE GSAP
--------------------------*/

gsap.from("#hero", {y:-50, opacity:0, duration:1});
gsap.from(".card", {opacity:0, y:30, duration:1, stagger:0.2});

/* INIT */
render();

</script>

</body>
</html>
