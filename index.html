<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>CYBER HUB v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
}

/* 3D BACKGROUND */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* WINDOW SYSTEM */
.window{
  position:absolute;
  width:320px;
  height:240px;
  background:rgba(15,23,42,0.9);
  border:1px solid #22c55e;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.title{
  background:#111827;
  padding:5px;
  cursor:move;
}

.content{
  padding:10px;
  flex:1;
  overflow:auto;
}

/* CHAT */
.chat{
  height:100%;
  font-size:12px;
}

input,button{
  padding:5px;
  margin-top:5px;
}

/* CLICKER */
.big{
  font-size:24px;
  font-weight:bold;
}

/* HUD */
.hud{
  position:fixed;
  top:10px;
  right:10px;
  padding:10px;
  background:rgba(0,0,0,0.5);
  border:1px solid #22c55e;
}

/* BUTTON */
button{
  background:#22c55e;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="hud">
🚀 Ship: OK<br>
⚡ Energy: 78%<br>
🌌 Sector: X-12
</div>

<!-- AI CHAT -->
<div class="window" id="ai" style="top:50px;left:50px;">
  <div class="title">🧠 AI CHAT</div>
  <div class="content chat" id="chat"></div>
  <input id="msg">
  <button onclick="send()">SEND</button>
</div>

<!-- CLICKER RPG -->
<div class="window" id="game" style="top:300px;left:80px;">
  <div class="title">🎮 RPG CLICKER</div>
  <div class="content">
    <div class="big" id="lvl">LVL 1</div>
    <div>XP: <span id="xp">0</span></div>
    <button onclick="kill()">ATTACK</button>
  </div>
</div>

<!-- SPACE SIM -->
<div class="window" id="space" style="top:120px;left:420px;">
  <div class="title">🛰️ SPACE SIM</div>
  <div class="content">
    <p id="status">STATUS: STABLE</p>
    <button onclick="boost()">BOOST</button>
    <button onclick="warp()">WARP</button>
  </div>
</div>

<script>

/* =====================
   DRAG & DROP WINDOWS
===================== */
let win = null;

document.querySelectorAll(".window").forEach(w=>{
  let title = w.querySelector(".title");

  title.onmousedown = e=>{
    win = w;
    let offsetX = e.clientX - w.offsetLeft;
    let offsetY = e.clientY - w.offsetTop;

    document.onmousemove = e=>{
      if(win){
        win.style.left = (e.clientX-offsetX)+"px";
        win.style.top = (e.clientY-offsetY)+"px";
      }
    }

    document.onmouseup = ()=>{ win=null; }
  }
});

/* =====================
   AI CHAT (FAKE GPT UI)
===================== */
function send(){
  let msg = document.getElementById("msg").value;
  let chat = document.getElementById("chat");

  let responses = [
    "Analizuję Twoje zapytanie...",
    "Odpowiedź wygenerowana ✔",
    "To interesujące podejście.",
    "Symulacja AI zakończona.",
    "Dane przetworzone."
  ];

  chat.innerHTML += "<div>👤 "+msg+"</div>";
  chat.innerHTML += "<div>🤖 "+responses[Math.random()*responses.length|0]+"</div>";
}

/* =====================
   CLICKER RPG
===================== */
let xp=0;
let lvl=1;

function kill(){
  xp+=10;

  if(xp>=100){
    lvl++;
    xp=0;
  }

  document.getElementById("xp").innerText=xp;
  document.getElementById("lvl").innerText="LVL "+lvl;
}

/* =====================
   SPACE SIM
===================== */
let energy=100;

function boost(){
  energy-=10;
  document.getElementById("status").innerText="STATUS: BOOSTING ⚡";
}

function warp(){
  document.getElementById("status").innerText="WARP DRIVE ACTIVE 🌌";
}

/* =====================
   THREE.JS CYBER SPACE
===================== */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("bg").appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<5000;i++){
  vertices.push((Math.random()-0.5)*2000);
  vertices.push((Math.random()-0.5)*2000);
  vertices.push((Math.random()-0.5)*2000);
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));

const material = new THREE.PointsMaterial({color:0x22c55e,size:2});
const points = new THREE.Points(geometry,material);
scene.add(points);

camera.position.z=5;

function animate(){
  requestAnimationFrame(animate);
  points.rotation.y += 0.001;
  renderer.render(scene,camera);
}
animate();

/* =====================
   LOFI SOUND (procedural)
===================== */
let ctx = new (window.AudioContext||window.webkitAudioContext)();

setInterval(()=>{
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.type="sine";
  o.frequency.value = 200 + Math.random()*200;

  g.gain.value=0.02;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime+0.2);
},800);

</script>

</body>
</html>
